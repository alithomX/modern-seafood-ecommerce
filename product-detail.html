function toFa(n){const d=['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];return String(n).replace(/\d/g,c=>d[c]);}
function formatPrice(p){return toFa(p.toLocaleString('en-US'))+' تومان';}

function showToast(msg,type='success'){
    const c=document.getElementById('toast-container'),t=document.createElement('div');
    const co={success:'bg-deep-blue',info:'bg-gray-700',error:'bg-red-600'};
    const ic={success:'fa-check-circle text-green-400',info:'fa-info-circle text-sky-400',error:'fa-exclamation-circle text-red-300'};
    t.className=`toast-enter ${co[type]} text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm pointer-events-auto`;
    t.innerHTML=`<i class="fa-solid ${ic[type]}"></i><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>{t.classList.remove('toast-enter');t.classList.add('toast-exit');},2500);
    setTimeout(()=>t.remove(),2900);
}

                        <div>
                            <div class="font-bold text-deep-blue text-sm">ضمانت بازگشت</div>
                            <div class="text-xs text-gray-400">بازگشت وجه در صورت نارضایتی</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-white rounded-2xl p-4 border border-gray-100">
                        <div class="w-12 h-12 rounded-xl bg-gold/10 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-truck-fast text-gold text-lg"></i>
                        </div>
                        <div>
                            <div class="font-bold text-deep-blue text-sm">ارسال به سراسر ایران</div>
                            <div class="text-xs text-gray-400">۳۱ استان تحت پوشش</div>
                        </div>
                    </div>
                </div>
            </div>

            ${nutritionSection}

            <!-- Add to Cart -->
            <div class="sticky bottom-4 bg-white rounded-2xl shadow-xl border border-gray-100 p-4 md:p-5">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-gray-100 rounded-xl">
                        <button onclick="changeQty(-1)" class="w-12 h-12 flex items-center justify-center text-gray-500 hover:text-coral transition-colors rounded-xl hover:bg-gray-200">
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <span id="qty" class="text-lg font-black text-deep-blue w-8 text-center">۱</span>
                        <button onclick="changeQty(1)" class="w-12 h-12 flex items-center justify-center text-gray-500 hover:text-coral transition-colors rounded-xl hover:bg-gray-200">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    <div class="flex-1">
                        <button onclick="addToCart()" class="add-to-cart-btn w-full text-white py-3.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cart-plus text-lg"></i>
                            <span>افزودن به سبد — ${formatPrice(product.price)}</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;

    // Load related products
    const related = allProducts.filter(p => p.id !== product.id && (isFish ? p.id < 100 : p.id >= 100)).slice(0, 4);
    document.getElementById('related-products').innerHTML = related.map(p => `
        <a href="product-detail.html?id=${p.id}&type=${p.id < 100 ? 'fish' : 'acc'}" class="group bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-xl transition-all hover:-translate-y-1">
            <div class="h-44 overflow-hidden relative">
                <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </div>
            <div class="p-4">
                <h4 class="font-bold text-deep-blue text-sm truncate mb-1">${p.name}</h4>
                <div class="text-coral font-black text-sm">${formatPrice(p.price)}</div>
            </div>
        </a>
    `).join('');
}

let qty = 1;
function changeQty(delta) {
    qty += delta;
    if (qty < 1) qty = 1;
    if (qty > 99) qty = 99;
    document.getElementById('qty').textContent = toFa(qty);
}

function addToCart() {
    if (!product) return;
    // Save to localStorage cart (shared with index.html)
    let cart = JSON.parse(localStorage.getItem('khalijtaze_cart') || '[]');
    const existing = cart.find(c => c.id === product.id);
    if (existing) {
        existing.qty += qty;
    } else {
        cart.push({ ...product, qty: qty });
    }
    localStorage.setItem('khalijtaze_cart', JSON.stringify(cart));
    showToast(`${product.name} (${toFa(qty)} عدد) به سبد اضافه شد`, 'success');
}

// Parallax effect on hero image
window.addEventListener('scroll', () => {
    const scrolled = window.scrollY;
    const heroImg = document.getElementById('hero-img');
    if (heroImg && scrolled < window.innerHeight) {
        heroImg.style.transform = `translateY(${scrolled * 0.4}px) scale(1.1)`;
    }
});

// Reveal animation on scroll
const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
        }
    });
}, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
});
</script>
</body>
</html>
